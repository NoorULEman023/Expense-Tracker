<!-- templates/index.html - Dashboard -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    
    <!-- Chart.js for Charts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">
                <i class="fas fa-wallet"></i>
                <span>ExpenseTracker</span>
            </a>
            <div class="nav-links">
                <a href="/" class="active">
                    <i class="fas fa-chart-pie"></i> Dashboard
                </a>
                <a href="/add">
                    <i class="fas fa-plus-circle"></i> Add Expense
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container">
        <!-- Statistics Cards -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon" style="background: rgba(16, 185, 129, 0.15);">
                    <i class="fas fa-dollar-sign" style="color: #10B981;"></i>
                </div>
                <div class="stat-content">
                    <span class="stat-label">Total Expenses</span>
                    <span class="stat-value" id="totalAmount">$0.00</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: rgba(37, 99, 235, 0.15);">
                    <i class="fas fa-receipt" style="color: #2563EB;"></i>
                </div>
                <div class="stat-content">
                    <span class="stat-label">Number of Expenses</span>
                    <span class="stat-value" id="totalCount">0</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: rgba(30, 41, 59, 0.10);">
                    <i class="fas fa-tag" style="color: #1E293B;"></i>
                </div>
                <div class="stat-content">
                    <span class="stat-label">Categories</span>
                    <span class="stat-value" id="categoryCount">0</span>
                </div>
            </div>
        </div>

        <!-- Filter Bar with Currency Selector -->
        <div class="filter-bar">
            <div class="filter-group">
                <i class="fas fa-filter" style="color: #64748B; margin-right: 8px;"></i>
                <select id="categoryFilter" class="filter-select">
                    <option value="all">All Categories</option>
                    <option value="Food">🍔 Food</option>
                    <option value="Transport">🚗 Transport</option>
                    <option value="Shopping">🛍️ Shopping</option>
                    <option value="Bills">📄 Bills</option>
                    <option value="Other">📌 Other</option>
                </select>
            </div>
            
            <!-- Currency Selector -->
            <div class="currency-selector">
                <label>
                    <input type="radio" name="currency" value="PKR" checked> 🇵🇰 PKR
                </label>
                <label>
                    <input type="radio" name="currency" value="USD"> 🇺🇸 USD
                </label>
            </div>
            
            <a href="/add" class="btn-add-mobile">
                <i class="fas fa-plus"></i> Add Expense
            </a>
        </div>

        <!-- Expenses Table -->
        <div class="table-wrapper">
            <table class="expense-table">
                <thead>
                    <tr>
                        <th>Description</th>
                        <th>Category</th>
                        <th>Amount</th>
                        <th>Date</th>
                        <th class="actions-col">Action</th>
                    </tr>
                </thead>
                <tbody id="expenseTableBody">
                    <!-- Data inserted by JavaScript -->
                </tbody>
            </table>
            <div id="emptyState" class="empty-state" style="display: none;">
                <i class="fas fa-inbox"></i>
                <p>No expenses yet. Start tracking!</p>
            </div>
        </div>

        <!-- ============================================ -->
        <!-- 🔥 CHARTS SECTION - ADDED HERE 🔥            -->
        <!-- ============================================ -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;">
            <!-- Pie Chart: Spending by Category -->
            <div style="background: white; padding: 20px; border-radius: 16px; border: 1px solid #E9EDF2;">
                <h3 style="font-size: 1rem; margin-bottom: 10px; color: #1E293B;">
                    <i class="fas fa-chart-pie" style="color: #2563EB;"></i> Spending by Category
                </h3>
                <canvas id="categoryChart" height="200"></canvas>
            </div>
            
            <!-- Bar Chart: Monthly Trend -->
            <div style="background: white; padding: 20px; border-radius: 16px; border: 1px solid #E9EDF2;">
                <h3 style="font-size: 1rem; margin-bottom: 10px; color: #1E293B;">
                    <i class="fas fa-chart-line" style="color: #10B981;"></i> Monthly Trend
                </h3>
                <canvas id="trendChart" height="200"></canvas>
            </div>
        </div>
        <!-- ============================================ -->
        <!-- END OF CHARTS SECTION                        -->
        <!-- ============================================ -->

        <!-- Footer -->
        <div class="summary-footer">
            <span>
                <i class="far fa-calendar-alt"></i> 
                Today: <span id="todayDate"></span>
            </span>
            <span>
                <i class="fas fa-chart-simple"></i> 
                <span id="categorySummary">Loading...</span>
            </span>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
