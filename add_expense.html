<!-- templates/add_expense.html - Add Expense Form -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Expense - Expense Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .add-container {
            max-width: 540px;
            margin: 3rem auto;
            background: white;
            padding: 2.5rem;
            border-radius: 28px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.04);
            border: 1px solid #E9EDF2;
        }
        .add-container h2 {
            font-weight: 600;
            font-size: 1.7rem;
            margin-bottom: 0.5rem;
            color: #0F172A;
        }
        .add-container .sub {
            color: #64748B;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            font-weight: 500;
            font-size: 0.9rem;
            color: #1E293B;
            display: block;
            margin-bottom: 0.3rem;
        }
        .form-group label .required {
            color: #EF4444;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 0.7rem 1rem;
            border: 1px solid #E2E8F0;
            border-radius: 14px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: 0.2s;
            background: #F8FAFC;
        }
        .form-group input:focus, .form-group select:focus {
            outline: 2px solid #2563EB;
            border-color: transparent;
            background: white;
        }
        .btn-primary {
            background: #2563EB;
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            box-shadow: 0 6px 16px rgba(37, 99, 235, 0.25);
        }
        .btn-primary:hover {
            background: #1D4ED8;
            transform: scale(1.01);
        }
        .btn-secondary {
            display: inline-block;
            margin-top: 1rem;
            color: #475569;
            text-decoration: none;
            font-weight: 500;
        }
        .btn-secondary:hover {
            color: #1E293B;
        }
        .message {
            padding: 0.8rem;
            border-radius: 14px;
            margin-bottom: 1.2rem;
            display: none;
        }
        .message.success {
            display: block;
            background: #ECFDF5;
            color: #065F46;
            border: 1px solid #A7F3D0;
        }
        .message.error {
            display: block;
            background: #FEF2F2;
            color: #991B1B;
            border: 1px solid #FECACA;
        }
        @media (max-width: 480px) {
            .add-container { padding: 1.5rem; margin: 1rem; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">
                <i class="fas fa-wallet"></i>
                <span>ExpenseTracker</span>
            </a>
            <div class="nav-links">
                <a href="/"><i class="fas fa-chart-pie"></i> Dashboard</a>
                <a href="/add" class="active"><i class="fas fa-plus-circle"></i> Add Expense</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="add-container">
            <h2><i class="fas fa-pen-alt" style="color: #2563EB; margin-right: 10px;"></i> Add Expense</h2>
            <p class="sub">Fill in the details below to track your spending.</p>

            <div id="messageBox" class="message"></div>

            <form id="addExpenseForm">
                <div class="form-group">
                    <label for="description">Description <span class="required">*</span></label>
                    <input type="text" id="description" placeholder="e.g., Coffee, Groceries..." required>
                </div>
                
                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category">
                        <option value="Food">🍔 Food</option>
                        <option value="Transport">🚗 Transport</option>
                        <option value="Shopping">🛍️ Shopping</option>
                        <option value="Bills">📄 Bills</option>
                        <option value="Other" selected>📌 Other</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="amount">Amount ($) <span class="required">*</span></label>
                    <input type="number" id="amount" step="0.01" placeholder="0.00" required>
                </div>
                
                <button type="submit" class="btn-primary">
                    <i class="fas fa-check-circle"></i> Add Expense
                </button>
            </form>

            <a href="/" class="btn-secondary">
                <i class="fas fa-arrow-left"></i> Back to Dashboard
            </a>
        </div>
    </div>

    <script>
        document.getElementById('addExpenseForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const description = document.getElementById('description').value.trim();
            const category = document.getElementById('category').value;
            const amount = document.getElementById('amount').value.trim();
            const msgBox = document.getElementById('messageBox');

            msgBox.className = 'message';
            msgBox.style.display = 'none';

            if (!description) {
                msgBox.textContent = 'Please enter a description.';
                msgBox.className = 'message error';
                msgBox.style.display = 'block';
                return;
            }
            
            if (!amount) {
                msgBox.textContent = 'Please enter an amount.';
                msgBox.className = 'message error';
                msgBox.style.display = 'block';
                return;
            }
            
            const amountNum = parseFloat(amount);
            if (isNaN(amountNum) || amountNum <= 0) {
                msgBox.textContent = 'Please enter a valid positive amount.';
                msgBox.className = 'message error';
                msgBox.style.display = 'block';
                return;
            }

            fetch('/api/expenses', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ description, category, amount: amountNum })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    msgBox.textContent = '✅ Expense added successfully!';
                    msgBox.className = 'message success';
                    msgBox.style.display = 'block';
                    document.getElementById('description').value = '';
                    document.getElementById('amount').value = '';
                    setTimeout(() => window.location.href = '/', 1200);
                } else {
                    msgBox.textContent = '❌ Error: ' + (data.error || 'Something went wrong.');
                    msgBox.className = 'message error';
                    msgBox.style.display = 'block';
                }
            })
            .catch(err => {
                msgBox.textContent = '❌ Network error. Please try again.';
                msgBox.className = 'message error';
                msgBox.style.display = 'block';
                console.error(err);
            });
        });
    </script>
</body>
</html>
